<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Movie Details</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f0f0f;
  color: #ffffff;
}

/* ===== Main Gallery Image ===== */
.main-image-wrapper {
  width: 100%;
  padding-top: 12px;      /* উপরে হালকা ফাঁকা */
  padding-bottom: 8px;
  display: flex;
  justify-content: center;
  background: #0f0f0f;
}

.main-image {
  max-width: 100%;
  height: auto;           /* আসল সাইজ ঠিক থাকবে */
  max-height: 260px;      /* খুব বড় হলে এখানেই থামবে */
  border-radius: 6px;
}

/* ===== Title ===== */
.title {
  text-align: center;     /* ⭐ মাঝখানে */
  font-size: 20px;
  font-weight: bold;
  margin: 8px 12px 14px;
}

/* ===== Image Grid ===== */
.grid {
  padding: 0 12px 12px;
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 8px;
}

.grid a {
  display: block;
}

.grid img {
  width: 100%;
  height: 160px;
  object-fit: cover;
  border-radius: 6px;
}
</style>
</head>

<body>

<!-- Gallery main image -->
<div class="main-image-wrapper">
  <img id="mainImage" class="main-image" src="" alt="">
</div>

<!-- Movie title -->
<div id="title" class="title">Loading...</div>

<!-- 4 image links -->
<div id="grid" class="grid"></div>

<script>
const API_URL = "https://sheetdb.io/api/v1/nek9ge34jycxv";

// page.html?id=1
const params = new URLSearchParams(window.location.search);
const movieId = params.get("id");

fetch(API_URL)
  .then(res => res.json())
  .then(data => {
    const movie = data.find(item => item.id === movieId);
    if (!movie) return;

    // Main gallery image
    document.getElementById("mainImage").src = movie.image;

    // Movie title (centered)
    document.getElementById("title").innerText = movie.title;

    // Image + link pairs
    const items = [
      { img: movie.img1, link: movie.link1 },
      { img: movie.img2, link: movie.link2 },
      { img: movie.img3, link: movie.link3 },
      { img: movie.img4, link: movie.link4 }
    ];

    const grid = document.getElementById("grid");

    items.forEach(item => {
      if (item.img && item.link) {
        const a = document.createElement("a");
        a.href = item.link;
        a.target = "_blank";

        const img = document.createElement("img");
        img.src = item.img;

        a.appendChild(img);
        grid.appendChild(a);
      }
    });
  });
</script>

</body>
</html>
