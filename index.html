<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  background: #000;
  font-family: Arial, sans-serif;
}

/* Gallery Grid */
.gallery {
  display: grid;
  grid-template-columns: repeat(2, 1fr); /* ALWAYS 2 */
  gap: 6px;
  padding: 6px;
}

/* Card */
.card {
  position: relative;
  width: 100%;
  aspect-ratio: 1 / 1.4; /* freefunz-like */
  background-size: cover;
  background-position: center;
  border-radius: 6px;
  overflow: hidden;
}

/* Click overlay */
.card a {
  position: absolute;
  inset: 0;
}

/* Title overlay (optional) */
.card span {
  position: absolute;
  bottom: 0;
  width: 100%;
  background: linear-gradient(to top, rgba(0,0,0,.8), transparent);
  color: #fff;
  font-size: 13px;
  padding: 6px;
  text-align: center;
}
</style>
<div class="gallery" id="gallery"></div>

<script>
fetch("https://sheetdb.io/api/v1/6suyus63y1agu")
  .then(res => res.json())
  .then(data => {
    const gallery = document.getElementById("gallery");
    data.forEach(item => {
      gallery.innerHTML += `
        <div class="card" style="background-image:url('${item.image}')">
          <a href="page.html?id=${item.id}"></a>
          <span>${item.title}</span>
        </div>
      `;
    });
  });
</script>
