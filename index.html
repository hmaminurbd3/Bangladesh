<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  background: #000;
  font-family: Arial, sans-serif;
}

/* Gallery Grid */
.gallery {
  display: grid;
  grid-template-columns: repeat(2, 1fr); /* ALWAYS 2 */
  gap: 6px;
  padding: 6px;
}

/* Card */
.card {
  position: relative;
  width: 100%;
  aspect-ratio: 1 / 1.4; /* freefunz-like */
  background-size: cover;
  background-position: center;
  border-radius: 6px;
  overflow: hidden;
}

/* Click overlay */
.card a {
  position: absolute;
  inset: 0;
}

/* Title overlay (optional) */
.card span {
  position: absolute;
  bottom: 0;
  width: 100%;
  background: linear-gradient(to top, rgba(0,0,0,.8), transparent);
  color: #fff;
  font-size: 13px;
  padding: 6px;
  text-align: center;
}
/* Text overlay (Eidt) */
.header {
  text-align: center;
  padding: 12px 8px;
  background: linear-gradient(135deg, #ff416c, #ff4b2b);
  color: #fff;
}

.header h1 {
  font-size: 18px;
  margin: 0 0 6px;
  font-weight: bold;
}

.header p {
  margin: 2px 0;
  font-size: 13px;
}

.header .phone {
  margin-top: 6px;
  font-weight: bold;
  color: #ffe600;
}
   /* Text overlay এনিমেশন টেকস্ট (Eidt) */
  .scroll-text {
  width: 100%;
  overflow: hidden;
  background: #000;
  padding: 4px 0; /* আগের থেকে কমানো */
}

.scroll-text p {
  display: inline-block;
  white-space: nowrap;
  color: #00ffcc;
  font-size: 22px; /* 🔥 বড় করা */
  font-weight: bold;
  margin: 0; /* 🔥 extra gap remove */
  line-height: 1.2; /* 🔥 gap control */
  animation: scrollLeft 10s linear infinite;
}

/* Animation */
@keyframes scrollLeft {
  0% {
    transform: translateX(100%);
  }
  100% {
    transform: translateX(-100%);
  }

</style>
<div class="header">
  <h1>সহিহ পদ্ধতিতে কুরআন শিক্ষা ফাউন্ডেশন</h1>
  <p>গণপ্রজাতন্ত্রী বাংলাদেশ সরকার কর্তৃক অনুমোদিত, রেজি নং ১৯৭০৮</p>
</div>
<div class="scroll-text">
  <p>সহিহ পদ্ধতিতে কুরআন শিক্ষা ফাউন্ডেশন। গণপ্রজাতন্ত্রী বাংলাদেশ সরকার কর্তৃক অনুমোদিত, রেজি নং ১৯৭০৮</p>
</div>
<div class="gallery" id="gallery"></div>

<script>
fetch("https://sheetdb.io/api/v1/nek9ge34jycxv")
  .then(res => res.json())
  .then(data => {
    const gallery = document.getElementById("gallery");
    data.forEach(item => {
      gallery.innerHTML += `
        <div class="card" style="background-image:url('${item.image}')">
          <a href="page.html?id=${item.id}"></a>
          <span>${item.title}</span>
        </div>
      `;
    });
  });
</script>
